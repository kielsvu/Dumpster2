<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>TrustKiel — Vouch List</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
<style>
  :root {
    --bg: #080808;
    --surface: #111111;
    --border: #2a1a22;
    --pink: #f4a7c3;
    --pink-soft: #f8c8db;
    --pink-dim: #c97ca0;
    --pink-glow: rgba(244,167,195,0.12);
    --text: #f0e0e8;
    --text-muted: #8a6a78;
    --text-dim: #5a4050;
    --radius: 14px;
    --transition: 0.25s cubic-bezier(0.4,0,0.2,1);
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html { scroll-behavior: smooth; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    font-weight: 300;
    min-height: 100vh;
    overflow-x: hidden;
  }

  body::before {
    content: '';
    position: fixed;
    top: -30%; left: 50%;
    transform: translateX(-50%);
    width: 700px; height: 500px;
    background: radial-gradient(ellipse, rgba(244,167,195,0.07) 0%, transparent 70%);
    pointer-events: none; z-index: 0;
  }

  body::after {
    content: '';
    position: fixed; inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.03'/%3E%3C/svg%3E");
    pointer-events: none; z-index: 0; opacity: 0.4;
  }

  .container {
    position: relative; z-index: 1;
    max-width: 680px; margin: 0 auto;
    padding: 60px 20px 80px;
  }

  /* ── HEADER ── */
  .header {
    text-align: center;
    margin-bottom: 56px;
    animation: fadeUp 0.7s ease both;
  }
  .header-eyebrow {
    font-size: 11px; letter-spacing: 0.3em;
    text-transform: uppercase; color: var(--pink-dim); margin-bottom: 14px;
  }
  .header h1 {
    font-family: 'Playfair Display', serif;
    font-size: clamp(2rem, 6vw, 3rem); font-weight: 700;
    color: var(--pink-soft); line-height: 1.1; margin-bottom: 12px;
    text-shadow: 0 0 60px rgba(244,167,195,0.3);
  }
  .header-sub { font-size: 13px; color: var(--text-muted); letter-spacing: 0.05em; }
  .vouches-count {
    display: inline-block; margin-top: 18px;
    background: var(--pink-glow); border: 1px solid var(--border);
    border-radius: 50px; padding: 6px 18px;
    font-size: 12px; color: var(--pink); letter-spacing: 0.08em;
  }

  /* ── SECTION LABEL ── */
  .section-label {
    font-size: 10px; letter-spacing: 0.3em; text-transform: uppercase;
    color: var(--text-dim); margin-bottom: 14px; padding-left: 4px;
  }

  /* ── VOUCH CARDS ── */
  .vouches-list { display: flex; flex-direction: column; gap: 14px; }

  .vouch-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 18px 22px 16px 26px;
    position: relative; overflow: hidden;
    animation: fadeUp 0.4s ease both;
    transition: border-color var(--transition), box-shadow var(--transition);
  }
  .vouch-card:hover {
    border-color: rgba(244,167,195,0.25);
    box-shadow: 0 4px 40px rgba(244,167,195,0.05);
  }
  .vouch-card::before {
    content: '';
    position: absolute; top: 0; left: 0;
    width: 3px; height: 100%;
    background: linear-gradient(180deg, var(--pink), var(--pink-dim));
    opacity: 0.6;
  }

  /* ── NAME ROW ── */
  .vouch-top {
    display: flex;
    align-items: baseline;
    justify-content: space-between;
    gap: 12px;
    margin-bottom: 7px;
    flex-wrap: nowrap;
  }
  .vouch-name {
    font-family: 'Playfair Display', serif;
    font-size: 1.05rem; color: var(--pink-soft);
    letter-spacing: 0.02em;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    flex-shrink: 1;
    min-width: 0;
  }
  .vouch-date {
    font-size: 12px;
    color: var(--text-dim);
    letter-spacing: 0.06em;
    white-space: nowrap;
    flex-shrink: 0;
    line-height: 1;
  }

  /* ── STARS ROW ── */
  .vouch-stars {
    display: flex;
    align-items: center;
    gap: 2px;
    margin-bottom: 9px;
  }

  /* ── COMMENT ── */
  .vouch-comment {
    font-size: 13.5px; color: var(--text-muted);
    line-height: 1.6; font-weight: 300;
  }

  /* ── EMPTY STATE ── */
  .empty-state {
    text-align: center; padding: 60px 20px;
    color: var(--text-dim); font-size: 13px; letter-spacing: 0.08em;
  }
  .empty-state .big {
    display: block; margin-bottom: 10px;
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(18px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  @media (max-width: 420px) {
    .container { padding: 40px 14px 60px; }
    .vouch-card { padding: 14px 14px 12px 18px; }
    .header h1 { font-size: 1.8rem; }
    .star { font-size: 11px; }
    .vouch-date { font-size: 11px; }
  }

  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-track { background: var(--bg); }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 10px; }
  ::-webkit-scrollbar-thumb:hover { background: var(--pink-dim); }

  /* ── SVG ICONS ── */
  .icon { display: inline-block; vertical-align: middle; flex-shrink: 0; }
  .icon-star { width: 13px; height: 13px; }
  .star-svg-filled { color: var(--pink); }
  .star-svg-empty  { color: var(--text-dim); }
  .icon-sparkle-lg { width: 36px; height: 36px; color: var(--border); display: block; margin: 0 auto 10px; }
</style>
</head>
<body>

<!-- SVG SPRITE -->
<svg xmlns="http://www.w3.org/2000/svg" style="display:none" aria-hidden="true">
  <symbol id="icon-star-filled" viewBox="0 0 24 24" fill="currentColor" stroke="none">
    <polygon points="12,2 15.09,8.26 22,9.27 17,14.14 18.18,21.02 12,17.77 5.82,21.02 7,14.14 2,9.27 8.91,8.26"/>
  </symbol>
  <symbol id="icon-star-empty" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
    <polygon points="12,2 15.09,8.26 22,9.27 17,14.14 18.18,21.02 12,17.77 5.82,21.02 7,14.14 2,9.27 8.91,8.26"/>
  </symbol>
  <symbol id="icon-sparkle" viewBox="0 0 24 24" fill="currentColor" stroke="none">
    <path d="M12 2 L13.5 10.5 L22 12 L13.5 13.5 L12 22 L10.5 13.5 L2 12 L10.5 10.5 Z"/>
  </symbol>
</svg>

<div class="container">
  <div class="header">
    <div class="header-eyebrow">BloxFruit Trades</div>
    <h1>TrustKiel Vouch List</h1>
    <div class="header-sub">Verified Trade Reviews</div>
    <div class="vouches-count" id="countBadge">— Vouches</div>
  </div>

  <div class="section-label">All Vouches — Newest First</div>
  <div class="vouches-list" id="vouchesList">
    <div class="empty-state">
      <svg class="icon icon-sparkle-lg" aria-hidden="true"><use href="#icon-sparkle"/></svg>
      Loading vouches…
    </div>
  </div>
</div>

<script>
  /* ─────────────────────────────────────────────────────────────
     VOUCH DATA — paste the contents of vouch.data here when you
     update it via the admin panel.
     ───────────────────────────────────────────────────────────── */
  const VOUCHES = [
    { "name": "Fast and Trusted", "rating": 10, "comment": "Blue Gear — highly recommend!", "date": "2026-01-02" },
    { "name": "Trusted Piloter", "rating": 10, "comment": "Full Gear (Human) — very trustworthy seller.", "date": "2026-01-01" },
    { "name": "Fast Service", "rating": 10, "comment": "Blue Gear — responded fast and delivered.", "date": "2025-12-31" },
    { "name": "Legit Piloter", "rating": 10, "comment": "Full Gear (Angel) — totally legit trade!", "date": "2025-12-30" },
    { "name": "Legit And Trusted", "rating": 10, "comment": "Full Gear (Cyborg) — great experience overall.", "date": "2025-12-30" },
    { "name": "Trusted Piloter", "rating": 10, "comment": "Full Gear (Ghoul) — fast and reliable.", "date": "2025-12-29" },
    { "name": "Spawned In Just 5mins", "rating": 10, "comment": "Levi (Tiki) — incredibly fast spawn, legit seller.", "date": "2025-12-11" },
    { "name": "Trusted Piloter", "rating": 10, "comment": "Full Gear (Shark) — smooth and legit.", "date": "2025-12-06" },
    { "name": "Good Service", "rating": 10, "comment": "Blue Gear — quick and easy transaction.", "date": "2025-11-11" },
    { "name": "MISS KO NA SIYA", "rating": 10, "comment": "MISS KO NA SIYA LIKE WTFF", "date": "2025-07-11" }
  ];

  /* ─── helpers ─── */
  function renderStars(rating) {
    let h = '';
    for (let i = 1; i <= 10; i++) {
      h += `<svg class="icon icon-star ${i <= rating ? 'star-svg-filled' : 'star-svg-empty'}" aria-hidden="true"><use href="#icon-${i <= rating ? 'star-filled' : 'star-empty'}"/></svg>`;
    }
    return h;
  }

  function formatDate(str) {
    const d = new Date(str + 'T00:00:00');
    return d.toLocaleDateString('en-US', { month: 'short', day: '2-digit', year: 'numeric' });
  }

  function esc(str) {
    return String(str)
      .replace(/&/g,'&amp;').replace(/</g,'&lt;')
      .replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  /* ─── render ─── */
  function renderVouches(list) {
    list.sort((a, b) => new Date(b.date) - new Date(a.date));
    document.getElementById('countBadge').textContent =
      `${list.length} Vouch${list.length !== 1 ? 'es' : ''}`;

    const c = document.getElementById('vouchesList');
    if (!list.length) {
      c.innerHTML = `<div class="empty-state"><svg class="icon icon-sparkle-lg" aria-hidden="true"><use href="#icon-sparkle"/></svg>No vouches yet.</div>`;
      return;
    }

    c.innerHTML = list.map((v, i) => `
      <div class="vouch-card" style="animation-delay:${Math.min(i*0.04,0.5)}s">
        <div class="vouch-top">
          <div class="vouch-name">${esc(v.name)}</div>
          <div class="vouch-date">${formatDate(v.date)}</div>
        </div>
        <div class="vouch-stars">${renderStars(Number(v.rating))}</div>
        <div class="vouch-comment">${esc(v.comment)}</div>
      </div>`).join('');
  }

  renderVouches(VOUCHES);
</script>
</body>
</html>
